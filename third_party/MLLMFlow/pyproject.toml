[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mllmflow"
version = "2.1.3"
description = "Multimodal intelligent conversation workflow builder"
readme = "readme.md"
requires-python = ">=3.10"
dependencies = [
    "requests",
    "moviepy==2.2.1",
    "json_repair",
]

[project.scripts]
mllmflow = "mllmflow.cli:main"

[tool.setuptools.packages.find]
where = ["."]
exclude = ["demo*", "projects*", "__pycache__*", "*.pyc"]
