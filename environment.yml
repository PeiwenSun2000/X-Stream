name: xstream-inference
# Recommended path is `uv sync --extra local` (see README). This conda spec is
# the conda-equivalent fallback; the package list mirrors requirements.txt.
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      - vllm==0.19.0
      - transformers==4.57.3
      - torch==2.10.0
      - requests>=2.32.0
      - moviepy==2.2.1
      - json-repair>=0.55.0
      - numpy>=2.2.0
      - tqdm>=4.66.0
      - openai>=1.50.0
      - aiohttp>=3.10.0
      # After conda env create:
      #   pip install -e third_party/MLLMFlow third_party/ModelHub third_party/stream-eval
